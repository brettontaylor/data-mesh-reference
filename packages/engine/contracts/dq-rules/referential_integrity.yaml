rule: referential_integrity
label: Referential integrity
scope: column
check: referential
severity: error
version: "1.0.0"
status: active
owner: data-governance
description: >-
  Every value in the bound column must exist in the referenced entity.field
  (bind via the application's `ref`, e.g. "currency.currency_code").
expression: "{{column}} IN (SELECT {{ref_field}} FROM {{ref_entity}})"
