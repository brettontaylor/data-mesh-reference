entity: trade
label: Trade
group: transaction
grain: one row per executed trade
owner: trading-data
source: trades_feed
# Model control (BDM)
version: 2.0.0
status: active
upstream: Order Management System

fields:
  - name: trade_id
    type: string
    classification: internal
    pk: true
    description: Unique trade identifier (surrogate key).
  - name: source_trade_ref
    type: string
    classification: internal
    bk: true
    description: Source-system trade reference (natural/business key from the OMS).
  - name: trade_date
    type: date
    classification: internal
    description: Execution date.
  - name: instrument_id
    type: string
    classification: internal
    fk: { entity: instrument, field: instrument_id }
    description: Traded instrument.
  - name: counterparty_id
    type: string
    classification: internal
    fk: { entity: counterparty, field: counterparty_id }
    description: Trade counterparty.
  - name: side
    type: string
    classification: internal
    facet: true
    description: BUY or SELL.
  - name: quantity
    type: decimal(18,4)
    classification: confidential
    mnpi: true
    description: Executed quantity.
  - name: price
    type: decimal(18,6)
    classification: confidential
    mnpi: true
    description: Execution price.
  - name: notional
    type: decimal(18,2)
    classification: confidential
    mnpi: true
    description: Notional value (quantity * price).
  - name: currency_code
    type: string
    classification: public
    fk: { entity: currency, field: currency_code }
    description: Settlement currency.
  - name: trader_id
    type: string
    classification: restricted
    pii: true
    description: Identity of the executing trader (personal data).

metrics:
  - name: notional_sum
    agg: sum
    field: notional
    description: Total notional traded.
  - name: trade_count
    agg: count
    field: trade_id
    description: Number of trades.

dimensions:
  - trade_date
  - instrument_id
  - counterparty_id
  - side
  - currency_code
