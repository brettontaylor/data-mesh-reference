apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: { app: {{ .Release.Name }}-api }
  template:
    metadata:
      labels: { app: {{ .Release.Name }}-api }
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - { name: ROLE, value: "api" }
            - { name: PORT, value: "{{ .Values.api.port }}" }
            {{- range $k, $v := .Values.config }}
            - { name: {{ $k }}, value: "{{ $v }}" }
            {{- end }}
          envFrom:
            - secretRef: { name: {{ .Values.existingSecret }} }
          ports: [{ containerPort: {{ .Values.api.port }} }]
          readinessProbe:
            httpGet: { path: /ready, port: {{ .Values.api.port }} }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: {{ .Values.api.port }} }
            initialDelaySeconds: 15
          resources: {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
spec:
  selector: { app: {{ .Release.Name }}-api }
  ports: [{ port: {{ .Values.api.port }}, targetPort: {{ .Values.api.port }} }]
