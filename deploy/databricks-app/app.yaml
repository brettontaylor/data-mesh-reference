# Databricks App bundle for Mapping and Metadata Platform (optional packaging, ADR-003).
# Runs the same image inside the Databricks workspace perimeter, inheriting
# Databricks auth + networking. Postgres is a managed instance reachable from the app.
#
#   databricks apps deploy mapping-metadata-platform --source-code-path .
name: mapping-metadata-platform
description: Enterprise metadata management & governance control plane
command: ["/entrypoint.sh"]
env:
  - name: ROLE
    value: all
  - name: PORT
    value: "8000"
  - name: DEV_AUTH
    value: "false"
  # DATABASE_URL, OIDC_ISSUER, GITLAB_* supplied via Databricks app secrets/resources.
  - name: DATABRICKS_HOST
    valueFrom: workspace
resources:
  - name: dct-postgres
    description: Postgres projection store
  - name: dct-secrets
    description: GitLab token, OIDC client secret, DB URL
